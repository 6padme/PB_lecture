<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 | Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-card {
            text-align: left;
            width: 100%;
            max-width: 480px;
        }

        .form-card h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 8px;
        }

        .form-card p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 28px;
            font-size: 0.95em;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 6px;
            color: var(--main-color);
        }

        .form-group input,
        .form-group textarea {
            padding: 12px 14px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            font-family: Arial, sans-serif;
            background-color: var(--container-bg);
            color: var(--main-color);
            transition: border-color 0.2s, background-color 0.3s;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: var(--primary-color);
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .submit-btn:hover {
            background-color: #45a049;
            box-shadow: 0 6px 8px rgba(0,0,0,0.15);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.95em;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        [data-theme="dark"] .form-group input,
        [data-theme="dark"] .form-group textarea {
            border-color: #444;
        }
    </style>
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    <div class="container form-card">
        <h1>제휴 문의</h1>
        <p class="subtitle">비즈니스 제휴 및 협업 문의를 남겨주세요.</p>
        <form action="https://formspree.io/f/xgopddan" method="POST">
            <div class="form-group">
                <label for="name">이름 / 회사명</label>
                <input type="text" id="name" name="name" placeholder="홍길동 / (주)회사명" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="subject">문의 유형</label>
                <input type="text" id="subject" name="subject" placeholder="광고, 협업, 기타...">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" placeholder="문의 내용을 자세히 적어주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
        <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
    </div>
    <script>
        const themeToggle = document.querySelector('#theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', next);
        });
    </script>
</body>
</html>
